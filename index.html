<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Maratón — Paula & Daisy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07070f; color: #f0f0f0; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #1a1a28; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const CLIENT_ID = "214998";
const REDIRECT_URI = window.location.href.split("?")[0].split("#")[0];
const STRAVA_SCOPE = "activity:read_all";

const PROFILES = {
  paula: { id:"paula", name:"Paula", emoji:"🔥", color:"#f97316" },
  daisy: { id:"daisy", name:"Daisy", emoji:"🌸", color:"#ec4899" },
};

const PHASES = [
  { id:1, name:"Base",       weeks:[1,2,3,4],           color:"#4ade80", emoji:"🌱" },
  { id:2, name:"Desarrollo", weeks:[5,6,7,8,9,10],      color:"#fb923c", emoji:"🔥" },
  { id:3, name:"Pico",       weeks:[11,12,13,14,15,16], color:"#f87171", emoji:"⚡" },
  { id:4, name:"Taper",      weeks:[17,18,19,20,21],    color:"#a78bfa", emoji:"🎯" },
];
const DAY_NAMES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

function buildPlan() {
  const plan = {};
  for (let w = 1; w <= 21; w++) {
    const isEasy = w % 4 === 0 && w < 17;
    const v = isEasy ? 0.7 : Math.min(1, 0.5 + w * 0.025);
    const short = +(3 + w*0.3*v).toFixed(1);
    const med   = +(6 + w*0.4*v).toFixed(1);
    const long  = +(8 + w*0.6*v).toFixed(1);
    const tempo = +(4 + w*0.25*v).toFixed(1);
    const gymA = { type:"gym", label:"Fuerza A", icon:"🏋️", color:"#60a5fa", details:["Sentadillas 4×10","Peso muerto 3×8","Hip thrust 3×12","Plancha 3×45s","Core rotacional 3×15"] };
    const gymB = { type:"gym", label:"Fuerza B", icon:"🏋️", color:"#60a5fa", details:["Estocadas 4×12","Step-up 3×10","Glúteo cable 3×15","Pantorrilla 4×20","Abdominales 3×20"] };
    const rec  = { type:"recovery", label:"Recuperación", icon:"🧘", color:"#34d399", details:["Foam roller 15min","Estiramientos 20min","Caminata suave opcional"] };
    const rest = { type:"rest", label:"Descanso", icon:"😴", color:"#6b7280", details:["Descanso total o yoga suave"] };
    if (w === 21) {
      plan[w] = {
        1:{type:"run",label:`Suave ${(short*.5).toFixed(1)}km`,icon:"🏃",color:"#4ade80",km:+(short*.5).toFixed(1),details:["Ritmo 6:30-7:00/km","Solo activar piernas"]},
        2:rest,3:{type:"run",label:"Strides 4km",icon:"⚡",color:"#fb923c",km:4,details:["3km calentamiento","4×100m strides"]},
        4:rest,5:rest,
        6:{type:"race",label:"🏁 MEDIA MARATÓN",icon:"🏅",color:"#f87171",km:21.1,details:["¡El gran día!","Desayuno 2h antes","Calentar 15min","¡A disfrutar! 🎉"]},
        7:rest,
      };
    } else if (isEasy) {
      plan[w]={1:{type:"run",label:`Fácil ${short}km`,icon:"🏃",color:"#4ade80",km:short,details:[`${short}km zona 2`,"FC 60-70%"]},2:gymA,3:rec,4:{type:"run",label:`Fácil ${short}km`,icon:"🏃",color:"#4ade80",km:short,details:[`${short}km fácil`]},5:gymB,6:{type:"run",label:`Largo ${med}km`,icon:"🏃",color:"#a78bfa",km:med,details:[`${med}km suave`]},7:rest};
    } else if (w<=4) {
      plan[w]={1:{type:"run",label:`Rodaje ${short}km`,icon:"🏃",color:"#4ade80",km:short,details:[`${short}km zona 2`]},2:gymA,3:rec,4:{type:"run",label:`Tempo ${tempo}km`,icon:"⚡",color:"#fb923c",km:tempo,details:["1km calentamiento",`${+(tempo-2).toFixed(1)}km umbral 5:10-5:30/km`,"1km vuelta calma"]},5:gymB,6:{type:"run",label:`Long Run ${long}km`,icon:"🏃",color:"#a78bfa",km:long,details:[`${long}km ritmo 6:00-6:30/km`]},7:rest};
    } else if (w<=10) {
      plan[w]={1:{type:"run",label:`Rodaje ${short}km`,icon:"🏃",color:"#4ade80",km:short,details:[`${short}km zona 2`]},2:gymA,3:{type:"run",label:`Interválico ${tempo}km`,icon:"🔥",color:"#f87171",km:tempo,details:["2km calentamiento","6×400m ritmo 5K","1min rec.","2km vuelta calma"]},4:rec,5:gymB,6:{type:"run",label:`Long Run ${long}km`,icon:"🏃",color:"#a78bfa",km:long,details:[`${long}km`]},7:rest};
    } else {
      plan[w]={1:{type:"run",label:`Rodaje ${short}km`,icon:"🏃",color:"#4ade80",km:short,details:[`${short}km fácil`]},2:gymA,3:{type:"run",label:`Tempo prog. ${tempo}km`,icon:"⚡",color:"#fb923c",km:tempo,details:[`${tempo}km progresivo`,"6:00→5:00/km"]},4:rec,5:gymB,6:{type:"run",label:`Long Run ${long}km`,icon:"🏃",color:"#a78bfa",km:long,details:[`${long}km ritmo objetivo 5:30/km`]},7:rest};
    }
  }
  return plan;
}
const PLAN = buildPlan();

const getPhase = w => PHASES.find(p=>p.weeks.includes(w))||PHASES[3];
const planKmWeek = w => Object.values(PLAN[w]||{}).reduce((s,d)=>s+(d.km||0),0);
const doneKmWeek = (w,done) => Object.entries(PLAN[w]||{}).reduce((s,[d])=>done[`${w}-${d}`]?s+(PLAN[w][d].km||0):s,0);
const totalPlanKm = Array.from({length:21},(_,i)=>i+1).reduce((s,w)=>s+planKmWeek(w),0);
const fmtPace = mps => { if(!mps)return"--"; const spm=1/mps*1000/60; const m=Math.floor(spm); const s=Math.round((spm-m)*60); return `${m}:${String(s).padStart(2,"0")}`; };
const fmtDist = m => (m/1000).toFixed(2)+"km";
const loadLocal = key => { try { return JSON.parse(localStorage.getItem(key)||"null"); } catch { return null; } };
const saveLocal = (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} };

async function exchangeCode(code, secret) {
  const r = await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({client_id:CLIENT_ID,client_secret:secret,code,grant_type:"authorization_code"})});
  if(!r.ok) throw new Error("Exchange failed");
  return r.json();
}
async function refreshStravaToken(refreshTk, secret) {
  const r = await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({client_id:CLIENT_ID,client_secret:secret,refresh_token:refreshTk,grant_type:"refresh_token"})});
  if(!r.ok) throw new Error("Refresh failed");
  return r.json();
}
async function fetchAllActivities(token) {
  let all=[],page=1,batch;
  do { const r=await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=100&page=${page}`,{headers:{Authorization:`Bearer ${token}`}}); batch=await r.json(); all=[...all,...batch]; page++; } while(batch.length===100);
  return all;
}

function App() {
  const [screen, setScreen]         = useState("select");
  const [activeUser, setActiveUser] = useState(null);
  const [appTab, setAppTab]         = useState("plan");
  const [week, setWeek]             = useState(1);
  const [modal, setModal]           = useState(null);
  const [paulaDone, setPaulaDone]   = useState(()=>loadLocal("hm_paula_done")||{});
  const [daisyDone, setDaisyDone]   = useState(()=>loadLocal("hm_daisy_done")||{});
  const [paulaStrava, setPaulaStrava] = useState(()=>loadLocal("strava_paula"));
  const [daisyStrava, setDaisyStrava] = useState(()=>loadLocal("strava_daisy"));
  const [paulaActs, setPaulaActs]   = useState([]);
  const [daisyActs, setDaisyActs]   = useState([]);
  const [secretModal, setSecretModal] = useState(null);
  const [secretVal, setSecretVal]   = useState("");
  const [syncing, setSyncing]       = useState(false);
  const [syncMsg, setSyncMsg]       = useState("");
  const [planStart, setPlanStart]   = useState(()=>loadLocal("plan_start"));
  const [dateScreen, setDateScreen] = useState(false);

  const profile     = activeUser ? PROFILES[activeUser] : null;
  const done        = activeUser==="paula" ? paulaDone : daisyDone;
  const setDone     = activeUser==="paula" ? setPaulaDone : setDaisyDone;
  const stravaData  = activeUser==="paula" ? paulaStrava : daisyStrava;
  const setStravaData = d => { if(activeUser==="paula"){setPaulaStrava(d);saveLocal("strava_paula",d);}else{setDaisyStrava(d);saveLocal("strava_daisy",d);}};
  const acts        = activeUser==="paula" ? paulaActs : daisyActs;

  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const code   = params.get("code");
    const userId = params.get("state");
    if(code && userId){
      window.history.replaceState({},"",window.location.pathname);
      const stored = loadLocal(`strava_${userId}`);
      if(stored?.clientSecret){ doExchange(userId,code,stored.clientSecret); }
      else { setSecretModal({userId,code}); setScreen("app"); setActiveUser(userId); }
    }
  },[]);

  function stravaAuthUrl(uid){ return `https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=${STRAVA_SCOPE}&state=${uid}`; }

  async function doExchange(userId,code,secret){
    setSyncing(true);setSyncMsg("Conectando con Strava...");
    try{
      const data=await exchangeCode(code,secret);
      const sd={accessToken:data.access_token,refreshToken:data.refresh_token,expiresAt:data.expires_at,clientSecret:secret,athlete:data.athlete};
      saveLocal(`strava_${userId}`,sd);
      userId==="paula"?setPaulaStrava(sd):setDaisyStrava(sd);
      setSyncMsg("¡Conectado! Cargando actividades...");
      await doLoadActivities(userId,data.access_token);
    }catch(e){setSyncMsg("❌ Error — verifica el Client Secret");}
    setSyncing(false);setSecretModal(null);
  }

  async function getValidToken(uid){
    const sd=loadLocal(`strava_${uid}`);
    if(!sd)return null;
    if(Date.now()/1000<sd.expiresAt-60)return sd.accessToken;
    const data=await refreshStravaToken(sd.refreshToken,sd.clientSecret);
    const updated={...sd,accessToken:data.access_token,refreshToken:data.refresh_token,expiresAt:data.expires_at};
    saveLocal(`strava_${uid}`,updated);
    uid==="paula"?setPaulaStrava(updated):setDaisyStrava(updated);
    return data.access_token;
  }

  async function doLoadActivities(uid,tokenOverride){
    setSyncing(true);setSyncMsg("Sincronizando actividades...");
    try{
      const token=tokenOverride||await getValidToken(uid);
      if(!token)throw new Error("No token");
      const all=await fetchAllActivities(token);
      const runs=all.filter(a=>a.type==="Run"||a.type==="TrailRun");
      uid==="paula"?setPaulaActs(runs):setDaisyActs(runs);
      if(planStart)autoMark(uid,runs,planStart);
      setSyncMsg(`✓ ${runs.length} carreras sincronizadas`);
      setTimeout(()=>setSyncMsg(""),3000);
    }catch(e){setSyncMsg("❌ Error al sincronizar");}
    setSyncing(false);
  }

  function autoMark(uid,activities,startDate){
    const start=new Date(startDate);
    const prevDone=uid==="paula"?{...paulaDone}:{...daisyDone};
    const newDone={...prevDone};
    activities.forEach(act=>{
      const actDate=new Date(act.start_date_local);
      const diff=Math.floor((actDate-start)/86400000);
      if(diff<0)return;
      const w=Math.floor(diff/7)+1;
      const d=(actDate.getDay()+6)%7+1;
      if(w>=1&&w<=21&&PLAN[w]?.[d]){
        newDone[`${w}-${d}`]={auto:true,stravaId:act.id,name:act.name,distance:act.distance,time:act.moving_time,pace:act.average_speed,hr:act.average_heartrate};
      }
    });
    if(uid==="paula"){setPaulaDone(newDone);saveLocal("hm_paula_done",newDone);}
    else{setDaisyDone(newDone);saveLocal("hm_daisy_done",newDone);}
  }

  function toggleDone(w,d){
    const k=`${w}-${d}`;const newDone={...done};
    newDone[k]?delete newDone[k]:(newDone[k]={manual:true});
    setDone(newDone);
    saveLocal(`hm_${activeUser}_done`,newDone);
  }

  const totalKmDone=uid=>Array.from({length:21},(_,i)=>i+1).reduce((s,w)=>s+doneKmWeek(w,uid==="paula"?paulaDone:daisyDone),0);
  const adherence=uid=>{const d=uid==="paula"?paulaDone:daisyDone;const td=Object.values(d).filter(Boolean).length;const ts=Array.from({length:21},(_,i)=>i+1).reduce((s,w)=>s+Object.keys(PLAN[w]||{}).length,0);return ts>0?Math.round((td/ts)*100):0;};
  const avgPace=uid=>{const a=uid==="paula"?paulaActs:daisyActs;if(!a.length)return null;return a.reduce((s,x)=>s+x.average_speed,0)/a.length;};
  const weekKmDone=uid=>doneKmWeek(week,uid==="paula"?paulaDone:daisyDone);

  // ── SELECT ──
  if(screen==="select") return (
    <div style={{minHeight:"100vh",background:"#07070f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'DM Sans',sans-serif"}}>
      <GoogleFonts/>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontSize:52,marginBottom:10}}>🏁</div>
        <h1 style={{fontFamily:"'Space Mono',monospace",fontSize:22,fontWeight:700,color:"#fff",letterSpacing:-0.5}}>MEDIA MARATÓN DÚO</h1>
        <p style={{color:"#555",fontSize:13,marginTop:6}}>21 semanas · 21.1km · Paula & Daisy</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:340}}>
        {Object.values(PROFILES).map(p=>{
          const km=totalKmDone(p.id);const adh=adherence(p.id);
          return(
            <button key={p.id} onClick={()=>{setActiveUser(p.id);if(!planStart)setDateScreen(true);setScreen("app");}}
              style={{background:"#0f0f1a",border:`2px solid ${p.color}44`,borderRadius:18,padding:"18px 20px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,transition:"all .2s"}}>
              <div style={{width:50,height:50,borderRadius:14,background:`${p.color}22`,border:`2px solid ${p.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{p.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:17,color:"#fff"}}>{p.name}</div>
                <div style={{fontSize:11,color:"#555",marginTop:3}}>{km.toFixed(1)}km · {adh}% adherencia</div>
              </div>
              <div style={{fontSize:18,color:p.color}}>→</div>
            </button>
          );
        })}
      </div>
      <div style={{marginTop:28,width:"100%",maxWidth:340,background:"#0f0f1a",borderRadius:14,padding:"14px 16px",border:"1px solid #1a1a28"}}>
        <div style={{fontSize:10,color:"#444",textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>⚔️ Versus — semana {week}</div>
        {["paula","daisy"].map(uid=>{
          const p=PROFILES[uid];const km=weekKmDone(uid);const maxKm=Math.max(weekKmDone("paula"),weekKmDone("daisy"),planKmWeek(week),1);
          return(<div key={uid} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:"#888"}}>{p.emoji} {p.name}</span><span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:p.color}}>{km.toFixed(1)}km</span></div>
            <div style={{height:5,background:"#141420",borderRadius:3}}><div style={{height:"100%",borderRadius:3,background:p.color,width:`${(km/maxKm)*100}%`,transition:"width .6s"}}/></div>
          </div>);
        })}
      </div>
    </div>
  );

  if(dateScreen) return(
    <div style={{minHeight:"100vh",background:"#07070f",display:"flex",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'DM Sans',sans-serif"}}>
      <GoogleFonts/>
      <div style={{maxWidth:360,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:10}}>{profile?.emoji}</div>
        <h2 style={{fontFamily:"'Space Mono',monospace",fontSize:17,marginBottom:6,color:"#fff"}}>¿Cuándo empieza el plan?</h2>
        <p style={{color:"#666",fontSize:12,marginBottom:20}}>Compartido para Paula y Daisy.</p>
        <input type="date" id="start-date" defaultValue={new Date().toISOString().split("T")[0]}
          style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid #222",background:"#111",color:"#fff",fontSize:14,marginBottom:12,outline:"none"}}/>
        <button onClick={()=>{const v=document.getElementById("start-date").value;if(!v)return;saveLocal("plan_start",v);setPlanStart(v);setDateScreen(false);}}
          style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:profile?.color,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          Comenzar plan →
        </button>
      </div>
    </div>
  );

  const phase=getPhase(week);const weekDays=PLAN[week]||{};
  const wKmDone=doneKmWeek(week,done);const wKmPlan=planKmWeek(week);
  const myTotalKm=totalKmDone(activeUser);

  return(
    <div style={{minHeight:"100vh",background:"#07070f",color:"#f0f0f0",fontFamily:"'DM Sans',sans-serif"}}>
      <GoogleFonts/>

      {secretModal&&(
        <div style={{position:"fixed",inset:0,background:"#000000dd",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div style={{background:"#111121",borderRadius:16,padding:22,width:"100%",maxWidth:360,border:`1px solid ${PROFILES[secretModal.userId].color}44`}}>
            <div style={{fontSize:30,textAlign:"center",marginBottom:10}}>{PROFILES[secretModal.userId].emoji}</div>
            <h3 style={{fontFamily:"'Space Mono',monospace",fontSize:15,textAlign:"center",marginBottom:6}}>Client Secret de Strava</h3>
            <p style={{color:"#666",fontSize:11,textAlign:"center",marginBottom:14}}>Solo se guarda en este dispositivo.</p>
            <input type="password" value={secretVal} onChange={e=>setSecretVal(e.target.value)} placeholder="Pega tu Client Secret aquí"
              style={{width:"100%",padding:"11px",borderRadius:8,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:12,marginBottom:10,outline:"none"}}/>
            <button onClick={()=>{if(!secretVal.trim())return;doExchange(secretModal.userId,secretModal.code,secretVal.trim());setSecretVal("");}}
              style={{width:"100%",padding:"11px",borderRadius:8,border:"none",background:"#fc4c02",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>Conectar</button>
            {syncMsg&&<p style={{marginTop:8,fontSize:11,color:"#4ade80",textAlign:"center"}}>{syncMsg}</p>}
          </div>
        </div>
      )}

      <div style={{background:"#0c0c18",borderBottom:"1px solid #141420",padding:"11px 14px"}}>
        <div style={{maxWidth:860,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setScreen("select")} style={{background:"#0f0f1a",border:"1px solid #1a1a28",borderRadius:7,color:"#777",padding:"5px 9px",cursor:"pointer",fontSize:11}}>← Perfiles</button>
            <div style={{display:"flex",alignItems:"center",gap:7,background:`${profile.color}18`,border:`1px solid ${profile.color}44`,borderRadius:9,padding:"5px 11px"}}>
              <span style={{fontSize:14}}>{profile.emoji}</span>
              <span style={{fontWeight:700,fontSize:13,color:profile.color}}>{profile.name}</span>
            </div>
            <div style={{flex:1}}/>
            {stravaData?.athlete?(
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <img src={stravaData.athlete.profile_medium} alt="" style={{width:26,height:26,borderRadius:"50%",border:`2px solid ${profile.color}`}}/>
                <button onClick={()=>doLoadActivities(activeUser)} disabled={syncing}
                  style={{background:"#fc4c0222",border:"1px solid #fc4c0244",color:"#fc4c02",borderRadius:6,padding:"3px 9px",fontSize:10,cursor:"pointer",fontWeight:700}}>
                  {syncing?"⟳":"⚡ Sync"}
                </button>
              </div>
            ):(
              <button onClick={()=>window.location.href=stravaAuthUrl(activeUser)}
                style={{background:"#fc4c02",border:"none",color:"#fff",borderRadius:7,padding:"6px 11px",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                ⚡ Strava
              </button>
            )}
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:14,color:profile.color}}>{myTotalKm.toFixed(1)}<span style={{fontSize:8,color:"#444"}}>km</span></div>
              <div style={{fontSize:8,color:"#333"}}>/{totalPlanKm.toFixed(0)}km</div>
            </div>
          </div>
          {syncMsg&&<div style={{fontSize:10,color:"#4ade80",textAlign:"center",marginTop:5}}>{syncMsg}</div>}
          <div style={{height:3,background:"#141420",borderRadius:2,marginTop:7}}>
            <div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg,${profile.color},${profile.color}88)`,width:`${Math.min(100,(myTotalKm/totalPlanKm)*100)}%`,transition:"width .7s"}}/>
          </div>
          <div style={{display:"flex",gap:3,marginTop:9}}>
            {[["plan","📅 Plan"],["versus","⚔️ Versus"],["strava","⚡ Strava"]].map(([t,l])=>(
              <button key={t} onClick={()=>setAppTab(t)}
                style={{padding:"4px 12px",borderRadius:6,fontSize:10,fontWeight:500,border:appTab===t?"none":"1px solid #1e1e2e",background:appTab===t?profile.color:"transparent",color:appTab===t?"#fff":"#555",cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"16px 12px"}}>

        {appTab==="plan"&&<>
          <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
            {PHASES.map(p=>(
              <div key={p.id} onClick={()=>setWeek(p.weeks[0])}
                style={{flex:1,minWidth:60,padding:"6px 8px",borderRadius:7,background:"#0f0f1a",border:`1px solid ${p.weeks.includes(week)?p.color:"#141420"}`,cursor:"pointer"}}>
                <div style={{fontSize:9,fontWeight:700,color:p.color,textTransform:"uppercase"}}>{p.emoji} {p.name}</div>
                <div style={{fontSize:8,color:"#333",marginTop:1}}>S{p.weeks[0]}-{p.weeks[p.weeks.length-1]}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:12}}>
            {Array.from({length:21},(_,i)=>i+1).map(w=>{
              const ph=getPhase(w);const pct=planKmWeek(w)>0?(doneKmWeek(w,done)/planKmWeek(w)):0;const isActive=w===week;
              return(<button key={w} onClick={()=>setWeek(w)}
                style={{width:30,height:30,borderRadius:6,fontSize:9,fontWeight:700,fontFamily:"'Space Mono',monospace",border:`1px solid ${isActive?profile.color:pct>=.9?"#22c55e44":"#141420"}`,background:isActive?profile.color:pct>=.9?"#0d1f0d":"#0f0f1a",color:isActive?"#fff":pct>=.9?"#22c55e":"#333",cursor:"pointer"}}>
                {w===21?"🏁":w}
              </button>);
            })}
          </div>
          <div style={{background:"#0f0f1a",border:`1px solid ${phase.color}33`,borderRadius:11,padding:"11px 14px",marginBottom:11,display:"flex",alignItems:"center",gap:11}}>
            <div style={{fontSize:22}}>{phase.emoji}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13}}>Semana {week}</span>
                <span style={{fontSize:8,background:`${phase.color}22`,color:phase.color,padding:"2px 6px",borderRadius:4,fontWeight:700,textTransform:"uppercase"}}>{phase.name}</span>
                {week%4===0&&week<17&&<span style={{fontSize:8,background:"#22c55e22",color:"#22c55e",padding:"2px 6px",borderRadius:4}}>↓ Descarga</span>}
              </div>
              {planStart&&<div style={{fontSize:10,color:"#444",marginTop:2}}>
                {new Date(new Date(planStart).getTime()+(week-1)*7*86400000).toLocaleDateString("es",{day:"numeric",month:"short"})} – {new Date(new Date(planStart).getTime()+((week-1)*7+6)*86400000).toLocaleDateString("es",{day:"numeric",month:"short"})}
              </div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13,color:profile.color}}>{wKmDone.toFixed(1)}<span style={{fontSize:8,color:"#555"}}>/{wKmPlan.toFixed(1)}km</span></div>
              <div style={{height:3,background:"#141420",borderRadius:2,marginTop:4,width:56}}><div style={{height:"100%",borderRadius:2,background:profile.color,width:`${wKmPlan>0?Math.min(100,(wKmDone/wKmPlan)*100):0}%`}}/></div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {[1,2,3,4,5,6,7].map(d=>{
              const data=weekDays[d];const k=`${week}-${d}`;const isDone=!!done[k];const isAuto=done[k]?.auto;
              if(!data)return<div key={d} style={{background:"#09090f",borderRadius:8,minHeight:88,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,color:"#1e1e28",textTransform:"uppercase"}}>{DAY_NAMES[d-1]}</span></div>;
              return(<div key={d} onClick={()=>setModal({week,day:d,data,k,isDone,stravaInfo:done[k]?.auto?done[k]:null})}
                style={{background:isDone?`${data.color}12`:"#0f0f1a",border:`1px solid ${isDone?data.color:"#141420"}`,borderRadius:8,padding:"7px 5px",minHeight:88,display:"flex",flexDirection:"column",gap:2,position:"relative",cursor:"pointer",transition:"all .15s"}}>
                {isDone&&<div style={{position:"absolute",top:3,right:3,fontSize:7,background:isAuto?"#fc4c02":profile.color,color:"#fff",borderRadius:3,padding:"1px 3px",fontWeight:700}}>{isAuto?"⚡":"✓"}</div>}
                <span style={{fontSize:7,color:"#333",textTransform:"uppercase"}}>{DAY_NAMES[d-1]}</span>
                <span style={{fontSize:15}}>{data.icon}</span>
                <span style={{fontSize:8,fontWeight:600,color:isDone?data.color:"#aaa",lineHeight:1.3}}>{data.label}</span>
                {data.km&&<span style={{fontSize:7,color:isDone?data.color:"#444",marginTop:"auto",fontFamily:"'Space Mono',monospace"}}>{isAuto?fmtDist(done[k].distance):data.km+"km"}</span>}
              </div>);
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
            <button disabled={week===1} onClick={()=>setWeek(w=>Math.max(1,w-1))} style={{padding:"7px 14px",borderRadius:7,background:"#0f0f1a",border:"1px solid #141420",color:week===1?"#222":"#777",cursor:week===1?"not-allowed":"pointer",fontSize:10}}>← Anterior</button>
            <button disabled={week===21} onClick={()=>setWeek(w=>Math.min(21,w+1))} style={{padding:"7px 14px",borderRadius:7,background:"#0f0f1a",border:"1px solid #141420",color:week===21?"#222":"#777",cursor:week===21?"not-allowed":"pointer",fontSize:10}}>Siguiente →</button>
          </div>
        </>}

        {appTab==="versus"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:"#0f0f1a",borderRadius:14,padding:"18px",border:"1px solid #1a1a28"}}>
              <div style={{textAlign:"center",marginBottom:14}}><span style={{fontSize:10,color:"#444",textTransform:"uppercase",letterSpacing:1}}>⚔️ Batalla total</span></div>
              <div style={{display:"flex",alignItems:"center"}}>
                {["paula","daisy"].map(uid=>{
                  const p=PROFILES[uid];const km=totalKmDone(uid);const adh=adherence(uid);
                  const wins=[totalKmDone(uid)>totalKmDone(uid==="paula"?"daisy":"paula"),adherence(uid)>adherence(uid==="paula"?"daisy":"paula"),(avgPace(uid)||0)>(avgPace(uid==="paula"?"daisy":"paula")||0),weekKmDone(uid)>weekKmDone(uid==="paula"?"daisy":"paula")].filter(Boolean).length;
                  return(<div key={uid} style={{flex:1,textAlign:"center",padding:"0 6px"}}>
                    <div style={{fontSize:30,marginBottom:4}}>{p.emoji}</div>
                    <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:14,color:p.color}}>{p.name}</div>
                    <div style={{fontFamily:"'Space Mono',monospace",fontSize:24,fontWeight:700,color:"#fff",marginTop:6}}>{km.toFixed(0)}<span style={{fontSize:10,color:"#555"}}>km</span></div>
                    <div style={{fontSize:10,color:"#666",marginTop:1}}>{adh}% adherencia</div>
                    <div style={{marginTop:6,fontSize:10,color:wins>=2?p.color:"#444",fontWeight:wins>=2?700:400}}>{wins>=2?"👑 Ganando":"Puntaje: "+wins}</div>
                  </div>);
                })}
                <div style={{position:"absolute",left:"50%",transform:"translateX(-50%)",fontSize:16,background:"#07070f",border:"1px solid #1a1a28",borderRadius:"50%",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}>⚔️</div>
              </div>
            </div>
            {[
              {label:"Km totales",vals:{paula:totalKmDone("paula"),daisy:totalKmDone("daisy")},fmt:v=>`${v.toFixed(1)}km`,higher:true},
              {label:"Adherencia",vals:{paula:adherence("paula"),daisy:adherence("daisy")},fmt:v=>`${v}%`,higher:true},
              {label:"Ritmo promedio",vals:{paula:avgPace("paula")||0,daisy:avgPace("daisy")||0},fmt:(v,uid)=>avgPace(uid)?fmtPace(avgPace(uid))+"/km":"--",higher:false},
              {label:`Km semana ${week}`,vals:{paula:weekKmDone("paula"),daisy:weekKmDone("daisy")},fmt:v=>`${v.toFixed(1)}km`,higher:true},
            ].map((stat,si)=>{
              const pv=stat.vals.paula||0;const dv=stat.vals.daisy||0;const max=Math.max(pv,dv)||1;
              const paulaWins=stat.higher?pv>=dv:(pv>0&&dv>0&&pv<=dv);
              return(<div key={si} style={{background:"#0f0f1a",borderRadius:11,padding:"12px 14px",border:"1px solid #141420"}}>
                <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>{stat.label}</div>
                {["paula","daisy"].map(uid=>{
                  const p=PROFILES[uid];const v=stat.vals[uid]||0;const isW=uid==="paula"?paulaWins:!paulaWins;
                  return(<div key={uid} style={{marginBottom:7}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,color:isW?p.color:"#666",fontWeight:isW?700:400}}>{p.emoji} {p.name}{isW&&pv!==dv?" 👑":""}</span>
                      <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:isW?p.color:"#555"}}>{stat.fmt(v,uid)}</span>
                    </div>
                    <div style={{height:4,background:"#141420",borderRadius:3}}><div style={{height:"100%",borderRadius:3,background:isW?p.color:`${p.color}44`,width:`${(v/max)*100}%`,transition:"width .6s"}}/></div>
                  </div>);
                })}
              </div>);
            })}
            <div style={{background:"#0f0f1a",borderRadius:11,padding:"12px 14px",border:"1px solid #141420"}}>
              <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Km por semana — ambas</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:2,height:64}}>
                {Array.from({length:21},(_,i)=>i+1).map(w=>{
                  const pKm=doneKmWeek(w,paulaDone);const dKm=doneKmWeek(w,daisyDone);
                  const maxKm=Math.max(...Array.from({length:21},(_,i)=>Math.max(doneKmWeek(i+1,paulaDone),doneKmWeek(i+1,daisyDone),planKmWeek(i+1))),1);
                  return(<div key={w} style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:1,height:60,cursor:"pointer"}} onClick={()=>{setWeek(w);setAppTab("plan");}}>
                    <div style={{width:"100%",height:`${(pKm/maxKm)*100}%`,background:PROFILES.paula.color,borderRadius:"2px 2px 0 0",opacity:.9,minHeight:pKm>0?2:0}}/>
                    <div style={{width:"100%",height:`${(dKm/maxKm)*100}%`,background:PROFILES.daisy.color,borderRadius:"2px 2px 0 0",opacity:.9,minHeight:dKm>0?2:0}}/>
                    <div style={{textAlign:"center",fontSize:5,color:w===week?"#fff":"#2a2a38",fontFamily:"'Space Mono',monospace"}}>{w}</div>
                  </div>);
                })}
              </div>
              <div style={{display:"flex",gap:10,marginTop:6}}>{["paula","daisy"].map(uid=><div key={uid} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:7,height:7,borderRadius:2,background:PROFILES[uid].color}}/><span style={{fontSize:9,color:"#555"}}>{PROFILES[uid].name}</span></div>)}</div>
            </div>
          </div>
        )}

        {appTab==="strava"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {!stravaData?.athlete?(
              <div style={{textAlign:"center",padding:"32px 20px",background:"#0f0f1a",borderRadius:14,border:"1px solid #141420"}}>
                <div style={{fontSize:40,marginBottom:10}}>{profile.emoji}</div>
                <h2 style={{fontFamily:"'Space Mono',monospace",fontSize:15,marginBottom:6}}>Strava de {profile.name}</h2>
                <p style={{color:"#666",fontSize:11,marginBottom:18}}>Sincroniza tus carreras automáticamente.</p>
                <button onClick={()=>window.location.href=stravaAuthUrl(activeUser)}
                  style={{background:"#fc4c02",border:"none",color:"#fff",borderRadius:9,padding:"11px 22px",fontWeight:700,fontSize:12,cursor:"pointer"}}>⚡ Conectar Strava de {profile.name}</button>
              </div>
            ):(
              <>
                <div style={{background:"#0f0f1a",borderRadius:11,padding:"12px",border:`1px solid ${profile.color}33`,display:"flex",alignItems:"center",gap:11}}>
                  <img src={stravaData.athlete.profile} alt="" style={{width:46,height:46,borderRadius:"50%",border:`3px solid ${profile.color}`}}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{stravaData.athlete.firstname} {stravaData.athlete.lastname}</div>
                    <div style={{fontSize:10,color:"#666",marginTop:1}}>{stravaData.athlete.city}</div>
                    <div style={{fontSize:9,color:"#fc4c02",marginTop:2}}>⚡ Conectado</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:16,color:"#fc4c02"}}>{(acts.reduce((s,a)=>s+a.distance,0)/1000).toFixed(0)}</div>
                    <div style={{fontSize:9,color:"#555"}}>km totales</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
                  {[{l:"Carreras",v:acts.length,i:"🏃"},{l:"Km",v:`${(acts.reduce((s,a)=>s+a.distance,0)/1000).toFixed(0)}km`,i:"📏"},{l:"Ritmo medio",v:avgPace(activeUser)?fmtPace(avgPace(activeUser))+"/km":"--",i:"⚡"}].map(c=>(
                    <div key={c.l} style={{background:"#0f0f1a",borderRadius:9,padding:"9px",border:"1px solid #141420",textAlign:"center"}}>
                      <div style={{fontSize:16}}>{c.i}</div>
                      <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13,color:profile.color,marginTop:3}}>{c.v}</div>
                      <div style={{fontSize:9,color:"#555",marginTop:1}}>{c.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#0f0f1a",borderRadius:11,padding:"11px 13px",border:"1px solid #141420"}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Actividades recientes</div>
                  {acts.slice(0,6).map(a=>(
                    <div key={a.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 7px",borderRadius:6,background:"#09090f",border:"1px solid #141420",marginBottom:5}}>
                      <span style={{fontSize:13}}>🏃</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10,fontWeight:600,color:"#ddd",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.name}</div>
                        <div style={{fontSize:8,color:"#444",marginTop:1}}>{new Date(a.start_date_local).toLocaleDateString("es",{day:"numeric",month:"short"})}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,color:"#fc4c02"}}>{fmtDist(a.distance)}</div>
                        <div style={{fontSize:8,color:"#555"}}>{fmtPace(a.average_speed)}/km</div>
                      </div>
                    </div>
                  ))}
                  {acts.length===0&&<div style={{textAlign:"center",color:"#333",fontSize:11,padding:"12px"}}>Sin actividades aún 🏃</div>}
                </div>
                <button onClick={()=>doLoadActivities(activeUser)} disabled={syncing}
                  style={{padding:"11px",borderRadius:9,border:"none",background:"#fc4c02",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  {syncing?"Sincronizando...":"🔄 Sincronizar"}
                </button>
                <button onClick={()=>{saveLocal(`strava_${activeUser}`,null);setStravaData(null);}}
                  style={{padding:"9px",borderRadius:7,border:"1px solid #222",background:"transparent",color:"#555",fontSize:10,cursor:"pointer"}}>
                  Desconectar Strava de {profile.name}
                </button>
              </>
            )}
          </div>
        )}
      </div>

      {modal&&(
        <div style={{position:"fixed",inset:0,background:"#000000dd",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,padding:"0 10px 16px"}} onClick={()=>setModal(null)}>
          <div style={{width:"100%",maxWidth:440,background:"#111121",borderRadius:14,border:`1px solid ${modal.data.color}44`,overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:`linear-gradient(135deg,${modal.data.color}18,transparent)`,padding:"14px 14px 10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:8,color:"#555",textTransform:"uppercase",letterSpacing:1}}>S{modal.week} · {DAY_NAMES[modal.day-1]} · {profile.emoji} {profile.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginTop:4}}>
                    <span style={{fontSize:20}}>{modal.data.icon}</span>
                    <h2 style={{fontSize:14,fontWeight:700}}>{modal.data.label}</h2>
                  </div>
                  {modal.data.km&&<div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:modal.data.color,marginTop:2}}>{modal.data.km}km planificados</div>}
                </div>
                <button onClick={()=>setModal(null)} style={{background:"#ffffff10",border:"none",color:"#888",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12}}>✕</button>
              </div>
            </div>
            {modal.stravaInfo&&(
              <div style={{padding:"0 14px",marginBottom:3}}>
                <div style={{background:"#fc4c0215",border:"1px solid #fc4c0230",borderRadius:8,padding:"7px 10px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {[["distancia",fmtDist(modal.stravaInfo.distance),"#fc4c02"],["ritmo",fmtPace(modal.stravaInfo.pace)+"/km","#fc4c02"],["FC",modal.stravaInfo.hr?`♥ ${Math.round(modal.stravaInfo.hr)}`:"--","#f87171"]].map(([l,v,c])=>(
                    <div key={l} style={{textAlign:"center"}}><div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:11,color:c}}>{v}</div><div style={{fontSize:7,color:"#555",marginTop:1}}>{l}</div></div>
                  ))}
                </div>
              </div>
            )}
            <div style={{padding:"0 14px 14px"}}>
              <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:8}}>
                {modal.data.details?.map((d,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6}}>
                    <div style={{width:3,height:3,borderRadius:"50%",background:modal.data.color,marginTop:5,flexShrink:0}}/>
                    <span style={{fontSize:11,color:"#aaa",lineHeight:1.5}}>{d}</span>
                  </div>
                ))}
              </div>
              <button onClick={()=>{toggleDone(modal.week,modal.day);setModal(null);}}
                style={{marginTop:12,width:"100%",padding:"11px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:modal.isDone?"#141420":profile.color,color:modal.isDone?"#555":"#fff"}}>
                {modal.isDone?"✗ Marcar como pendiente":"✓ Marcar como completado"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function GoogleFonts() {
  useEffect(()=>{
    const l=document.createElement("link");
    l.rel="stylesheet";
    l.href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap";
    document.head.appendChild(l);
  },[]);
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
